<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Futuro - Raposa da Sorte</title>
  <style>
    :root {
      --bg: #02003A;
      --green: #38E67D;
      --white: #ffffff;
      --muted: rgba(255,255,255,0.72);
      --card: rgba(255,255,255,0.06);
      --border: rgba(56,230,125,0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(56,230,125,0.12), transparent 45%), var(--bg);
      color: var(--white);
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(10px);
      padding: 22px;
      box-shadow: 0 20px 48px rgba(0,0,0,0.45);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      color: var(--green);
    }
    p {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .back {
      margin-top: 16px;
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--green);
      color: #02003A;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Dashboard da Raposa (Em construção)</h1>
    <p>Você já está no fluxo certo. Esta página está preparada para receber o seu dashboard completo.</p>
    <p>Quando o dashboard final estiver pronto, basta substituir este arquivo pelo conteúdo definitivo.</p>
    <a class="back" href="esportedasorte.html">Voltar para o site</a>
  </main>
</body>
</html>
